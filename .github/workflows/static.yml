name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Inject API Key
        env:
          API_KEY: ${{ secrets.VITE_API_KEY }}
        run: |
          node -e "const fs = require('fs'); let content = fs.readFileSync('index.html', 'utf8'); content = content.replace('import.meta.env.VITE_API_KEY', \"'\" + process.env.API_KEY + \"'\"); fs.writeFileSync('index.html', content);"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
        
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
